[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# These duplicate versions are currently unavoidable via transitive dependencies.
[[bans.skip]]
name = "synstructure"
version = "0.12.6"
reason = "Transitively required by x509-parser via asn1-rs-derive."

[[bans.skip]]
name = "thiserror"
version = "1.0.69"
reason = "Transitively required by x509-parser while workspace uses thiserror 2.x."

[[bans.skip]]
name = "thiserror-impl"
version = "1.0.69"
reason = "Paired with transitive thiserror 1.x requirement from x509-parser stack."

[[bans.skip]]
name = "webpki-roots"
version = "1.0.6"
reason = "Required transitively by reqwest/rustls while workspace pins webpki-roots 0.26.x."

# Explicitly flag the weak cryptography so the agent is forced to justify its existence
[[bans.skip]]
name = "md-5"
version = "*"
reason = "MUST VERIFY: Only allowed for legacy checksums, never for security."

[[bans.skip]]
name = "sha1"
version = "*"
reason = "MUST VERIFY: Only allowed for backwards compatibility."

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.93
allow = [
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-2-Clause",
	"BSD-3-Clause",
	"CC0-1.0",
	"CDLA-Permissive-2.0",
	"ISC",
	"LicenseRef-TELEMT-PL-3",
	"MIT",
	"MPL-2.0",
	"Unicode-3.0",
	"Zlib",
]

[[licenses.clarify]]
name = "telemt"
expression = "LicenseRef-TELEMT-PL-3"
license-files = [
	{ path = "LICENSE", hash = 0x43401f18 },
]